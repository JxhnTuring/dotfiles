# =========================
# MONITORES
# =========================

monitor=HDMI-A-1,1920x1080@120,0x0,1
monitor=DP-1,1920x1080@144,1920x0,1

# =========================
# VARIABLES NVIDIA
# =========================

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct
env = WLR_NO_HARDWARE_CURSORS,1

# =========================
# PROGRAMAS AL INICIAR
# =========================

exec-once = waybar
exec-once = hyprpaper
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# =========================
# WALLPAPER
# =========================

# Cambia wallpaper.jpg por tu imagen
preload = ~/Wallpapers/wallpaper.jpg
wallpaper = ,~/Wallpapers/wallpaper.jpg

# =========================
# INPUT
# =========================

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

# =========================
# GENERAL
# =========================

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    allow_tearing = false
}

# =========================
# DECORACIÓN
# =========================

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# =========================
# ANIMACIONES
# =========================

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# =========================
# LAYOUT
# =========================

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

# =========================
# MISC
# =========================

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# =========================
# KEYBINDS
# =========================

$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = CTRL ALT, T, exec, kitty
bind = $mainMod, D, exec, rofi -show drun

bind = $mainMod, E, exec, dolphin
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, B, exec, firefox

bind = $mainMod, M, exit
bind = $mainMod, F, fullscreen

# Cambiar ventanas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
workspace=1,monitor:DP-1
workspace=2,monitor:HDMI-A-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Mover ventanas
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Cerrar ventana
bind = $mainMod SHIFT, Q, killactive

# Ventana flotante
bind = $mainMod, V, togglefloating

# Screenshot
bind = $mainMod, P, exec, grimblast copy area

# =========================
# MOUSE
# =========================

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
